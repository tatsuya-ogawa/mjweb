name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      include_garden:
        description: "Include the optional Garden Gaussian demo in the build artifact"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build static app
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      INCLUDE_GARDEN: ${{ github.event_name == 'workflow_dispatch' && inputs.include_garden }}
      MJWEB_PREPARE_MJLAB_REF: a0ba05890a2ea4111b33c9cbb85f690bf19ca434
      MJWEB_PREPARE_MJLAB_TOKEN: ${{ secrets.MJLAB_REPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configure GitHub Pages
        id: pages
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Prepare generated assets
        run: npm run prepare:assets:ci

      - name: Restore Garden cache
        if: ${{ env.INCLUDE_GARDEN == 'true' }}
        uses: actions/cache@v4
        with:
          path: public/envs/go1_gaussian/splats/garden/garden.splat
          key: garden-splat-v1

      - name: Download Garden demo
        if: ${{ env.INCLUDE_GARDEN == 'true' }}
        run: npm run setup:garden

      - name: Build
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          export MJWEB_BASE_PATH="/"
          if [ -n "${PAGES_BASE_PATH}" ]; then
            export MJWEB_BASE_PATH="${PAGES_BASE_PATH}/"
          fi
          if [ "${INCLUDE_GARDEN}" = "true" ]; then
            npm run build:local-gaussian
          else
            npm run build
          fi

      - name: Disable Jekyll for GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        run: touch dist/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mjweb-dist${{ env.INCLUDE_GARDEN == 'true' && '-garden' || '' }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/
          include-hidden-files: true

  deploy:
    name: Deploy GitHub Pages
    if: ${{ github.event_name != 'pull_request' }}
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
